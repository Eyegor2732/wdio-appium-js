name: Android WDIO Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android-tests:
    name: Run Android E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Verify Appium drivers
        run: npx appium driver list --installed

      - name: Run WDIO Android tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-linux-hw-accel: false
          cores: 2
          emulator-boot-timeout: 300
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-snapshot-save -no-metrics
          disable-animations: true
          script: |
            # Wait for package manager to be fully ready
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            # Dismiss any "System UI not responding" or other ANR dialogs
            adb shell input keyevent 4 || true
            adb shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS || true
            # Wait for the launcher to become idle (window manager ready)
            adb shell wm size
            sleep 5
            npm run test:ci

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: appium-logs/
          if-no-files-found: ignore

  android-apidemos-tests:
    name: Run Android ApiDemos E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Verify Appium drivers
        run: npx appium driver list --installed

      - name: Run WDIO ApiDemos tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-linux-hw-accel: false
          cores: 2
          emulator-boot-timeout: 300
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-snapshot-save -no-metrics
          disable-animations: true
          script: |
            # Wait for package manager to be fully ready
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            # Dismiss any "System UI not responding" or other ANR dialogs
            adb shell input keyevent 4 || true
            adb shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS || true
            # Wait for the launcher to become idle (window manager ready)
            adb shell wm size
            sleep 5
            CI=1 npm run wdio:apidemos

      - name: Upload Appium logs (ApiDemos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs-apidemos
          path: appium-logs/
          if-no-files-found: ignore
